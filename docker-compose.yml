# Compose de validacao local da Fase 1: app containerizada + MySQL.
# Na Fase 2 este arquivo ganha o Caddy e o MySQL sai (vira RDS).
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootlocal}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestaofacilbanco}
    ports:
      - "3307:3306" # 3307 no host para nao colidir com um MySQL local
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      # o app usa ServerVersion.AutoDetect e conecta ja no startup, entao precisa
      # esperar o banco aceitar conexao de verdade. "mysqladmin ping" responde OK
      # ainda durante a inicializacao do entrypoint, por isso rodamos um SELECT.
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootlocal}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    # rede de seguranca: se o banco ainda nao estiver pronto o app morre no
    # startup (AutoDetect + Migrate), e o restart resolve sozinho
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppDbConnectionString: "Server=db;Port=3306;Database=${MYSQL_DATABASE:-gestaofacilbanco};User=root;Password=${MYSQL_ROOT_PASSWORD:-rootlocal};"
      Jwt__Key: ${JWT_KEY:?defina JWT_KEY no .env}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL:-http://localhost:8080}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD no .env}
    ports:
      - "8080:8080"

volumes:
  db-data:
