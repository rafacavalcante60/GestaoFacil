# Compose da Fase 2, para rodar na VM da nuvem. Diferencas para o docker-compose.yml local:
#  - o Caddy entra na frente, termina o TLS e faz proxy para o app
#  - nao ha container de MySQL: o banco e o "Azure Database for MySQL - flexible
#    server" (equivalente ao RDS), alcancado pela rede privada da VNet
#  - o app NAO publica porta no host: so o Caddy fica exposto (80/443)
# Uso na VM:  docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # SslMode=Required e obrigatorio: o flexible server sobe com
      # require_secure_transport=ON e recusa conexao em texto puro. Sem isso o
      # app morre no startup (AutoDetect) com erro de conexao pouco obvio.
      ConnectionStrings__AppDbConnectionString: "Server=${DB_HOST:?defina DB_HOST};Port=3306;Database=${DB_NAME:-gestaofacilbanco};User=${DB_USER:?defina DB_USER};Password=${DB_PASSWORD:?defina DB_PASSWORD};SslMode=Required;"
      Jwt__Key: ${JWT_KEY:?defina JWT_KEY}
      Frontend__BaseUrl: https://${DOMAIN:?defina DOMAIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD}
      # SMTP do "esqueci minha senha". Sem estas variaveis o envio falha so
      # quando alguem usa o fluxo — o app sobe normalmente.
      Email__SmtpHost: ${SMTP_HOST:-smtp-relay.brevo.com}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER:-}
      Email__SmtpPass: ${SMTP_PASS:-}
      Email__From: ${SMTP_FROM:-}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:?defina DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # persistem os certificados: sem isso cada "up" pede um cert novo ao
      # Let's Encrypt e voce bate no rate limit deles (5 por semana por dominio).
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
