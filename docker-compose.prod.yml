# Compose da Fase 2, para rodar na VM da nuvem. Diferencas para o docker-compose.yml local:
#  - o Caddy entra na frente, termina o TLS e faz proxy para o app
#  - nem o app nem o banco publicam porta no host: so o Caddy fica exposto (80/443)
#  - o MySQL usa um usuario dedicado, nao root
# Uso na VM:  docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?defina DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-gestaofacilbanco}
      MYSQL_USER: ${DB_USER:?defina DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD}
    volumes:
      # os dados vivem aqui. Este volume e o unico estado que nao esta no git:
      # sem backup dele, recriar a VM significa perder o banco.
      - db-data:/var/lib/mysql
    healthcheck:
      # o app usa ServerVersion.AutoDetect e conecta ja no startup, entao precisa
      # esperar o banco aceitar conexao de verdade. "mysqladmin ping" responde OK
      # ainda durante a inicializacao do entrypoint, por isso rodamos um SELECT.
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-u${DB_USER}", "-p${DB_PASSWORD}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Cache dos relatorios. Cache puro: sem persistencia (--save "" / --appendonly no) e
  # com teto de memoria + politica LRU, para nunca competir com o resto da VM de 1 GB.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    # nao publica porta no host: so o app na rede interna do compose alcanca o Redis.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppDbConnectionString: "Server=db;Port=3306;Database=${DB_NAME:-gestaofacilbanco};User=${DB_USER:?defina DB_USER};Password=${DB_PASSWORD:?defina DB_PASSWORD};"
      # sem esta connection string o app cai no cache em memoria; com ela usa o Redis acima.
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Key: ${JWT_KEY:?defina JWT_KEY}
      Frontend__BaseUrl: https://${DOMAIN:?defina DOMAIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD}
      # SMTP do "esqueci minha senha". Sem estas variaveis o envio falha so
      # quando alguem usa o fluxo — o app sobe normalmente.
      Email__SmtpHost: ${SMTP_HOST:-smtp-relay.brevo.com}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER:-}
      Email__SmtpPass: ${SMTP_PASS:-}
      Email__From: ${SMTP_FROM:-}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:?defina DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # persistem os certificados: sem isso cada "up" pede um cert novo ao
      # Let's Encrypt e voce bate no rate limit deles (5 por semana por dominio).
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
