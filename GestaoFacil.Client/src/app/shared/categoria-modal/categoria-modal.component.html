<div class="modal-form-container">
  <div class="modal-header">
    <h2>Gerenciar Categorias {{ tipo === 'despesa' ? 'de Despesa' : 'de Receita' }}</h2>
    <button type="button" class="modal-close-btn" (click)="fecharModal()">×</button>
  </div>

  <div class="modal-body">
    <!-- Mensagens -->
    <p class="success" *ngIf="successMsg">{{ successMsg }}</p>
    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <!-- Seção de adição -->
    <div class="categoria-section">
      <h3>Adicionar Nova Categoria</h3>
      <div class="input-group">
        <input
          type="text"
          class="input"
          [(ngModel)]="novaCategoria"
          placeholder="Digite o nome da categoria"
          (keyup.enter)="adicionarCategoria()"
        />
        <button class="btn btn-add" type="button" (click)="adicionarCategoria()">
          Adicionar
        </button>
      </div>
    </div>

    <!-- Lista de categorias -->
    <div class="categoria-section">
      <h3>Categorias Existentes</h3>
      <div class="categoria-list">
        <div *ngIf="categorias.length === 0" class="empty-state">
          Nenhuma categoria cadastrada.
        </div>

        <div *ngFor="let cat of categorias" class="categoria-item">
          <div *ngIf="editandoId !== cat.id" class="categoria-view">
            <span class="categoria-nome">{{ cat.nome }}</span>
            <div class="categoria-actions">
              <button
                type="button"
                class="btn-action btn-action--edit"
                (click)="iniciarEdicao(cat)"
                title="Editar"
                aria-label="Editar"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"></path>
                </svg>
              </button>
              <button
                type="button"
                class="btn-action btn-action--delete"
                (click)="deletarCategoria(cat)"
                title="Deletar"
                aria-label="Excluir"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm13-15h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
                </svg>
              </button>
            </div>
          </div>

          <div *ngIf="editandoId === cat.id" class="categoria-edit">
            <input
              type="text"
              class="input input-small"
              [(ngModel)]="editandoNome"
              (keyup.enter)="salvarEdicao()"
              (keyup.escape)="cancelarEdicao()"
            />
            <div class="categoria-actions-edit">
              <button
                type="button"
                class="btn btn-small btn-save"
                (click)="salvarEdicao()"
              >
                Salvar
              </button>
              <button
                type="button"
                class="btn btn-small btn-cancel"
                (click)="cancelarEdicao()"
              >
                Cancelar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn" type="button" (click)="fecharModal()">Fechar</button>
  </div>
</div>

<div class="modal-overlay confirm-overlay" *ngIf="confirmacaoExclusaoAberta" (click)="cancelarExclusao()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="confirm-modal-card">
      <h2 class="confirm-modal-title">Confirmar exclusão</h2>
      <p class="confirm-modal-message">
        Deseja excluir a categoria "{{ categoriaParaExcluir?.nome || '' }}"?
      </p>
      <div class="confirm-modal-actions">
        <button class="btn btn-danger" type="button" (click)="confirmarExclusao()">Excluir</button>
        <button class="btn btn-light" type="button" (click)="cancelarExclusao()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
