<div class="modal-form-container">
  <button type="button" class="modal-close-btn" (click)="cancelar()" aria-label="Fechar modal">×</button>
  <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; justify-content: center">
    <h1 class="h1" style="color: var(--orange)">
      {{ isEdit ? 'Editar Despesa' : 'Nova Despesa' }}
    </h1>
  </div>

  <form
    class="form-centered"
    (ngSubmit)="salvarDespesa()"
    aria-label="Formulário de despesas"
  >
    <label class="muted">Nome da despesa</label>
    <input
      type="text"
      class="input"
      placeholder="Ex: Mercado, Uber, Internet..."
      [(ngModel)]="nome"
      name="nome"
      required
    />

    <label class="muted">Data</label>
    <input
      type="date"
      class="input"
      [(ngModel)]="data"
      name="data"
      required
    />

    <label class="muted">Valor</label>
    <input
      type="number"
      step="1"
      class="input"
      placeholder="R$ 0,00"
      [(ngModel)]="valor"
      name="valor"
      required
    />

    <label class="muted">Forma de Pagamento</label>
    <select
      class="input"
      [(ngModel)]="formaPagamentoId"
      name="formaPagamentoId"
      required
    >
      <option *ngFor="let f of formasPagamento" [value]="f.id">
        {{ f.nome }}
      </option>
    </select>

    <label class="muted">Categoria</label>
    <select
      class="input"
      [(ngModel)]="categoriaDespesaId"
      name="categoriaDespesaId"
      required
    >
      <option *ngFor="let c of categoriasDespesa" [value]="c.id">
        {{ c.nome }}
      </option>
    </select>

    <label class="muted">Descrição</label>
    <textarea
      class="input descricao-box"
      rows="3"
      placeholder="Descrição detalhada da despesa"
      [(ngModel)]="descricao"
      name="descricao"
    ></textarea>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <div style="display: flex; gap: 12px; margin-top: 8px; justify-content: flex-start">
      <button class="btn" type="submit">Salvar</button>
      <button class="btn-limpar" type="button" (click)="limpar()">
        Limpar
      </button>
      <button class="btn" type="button" (click)="cancelar()">
        Cancelar
      </button>
    </div>
  </form>
</div>
